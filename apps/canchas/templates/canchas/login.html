{% extends 'canchas/fragments/base.html' %}
{% block main-content %}

    <div class="center-align" style="padding: 20px;">
        <i class="material-icons" style="font-size: 100px; color: #388e3c;">sports_soccer</i>
        <h5 class="green-text darken-2">SportConnect</h5>
    </div>

    <div class="row">
        <div class="col s8 offset-s2">
            {% if message %}
                <div class="card-panel red darken-1">
                    <span class="white-text">{{ message }}</span>
                </div>
            {% endif %}
            {% include 'canchas/fragments/forms.html' %}
        </div>
    </div>
{% endblock %}
