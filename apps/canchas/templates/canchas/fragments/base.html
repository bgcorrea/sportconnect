<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SportConnect</title>
    <!--Import Google Icon Font-->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.100.2/css/materialize.min.css">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <style>
        .errorlist { color: #F44336 !important; }
    </style>
</head>
<body>
<nav class="green darken-2" role="navigation">
    <div class="nav-wrapper container">
        <a id="logo-container" href="{% url 'canchas:home' %}" class="brand-logo">SportConnect</a>
        {% if request.user.is_authenticated %}
            <ul class="right hide-on-med-and-down">
                <li><a href="{% url 'canchas:home' %}">Canchas</a></li>
                <li><a href="{% url 'canchas:deporte-list' %}">Deportes</a></li>
                <li><a href="{% url 'canchas:reserva-list' %}">Reservas</a></li>
                <li><a href="{% url 'canchas:log-out' %}">Salir</a></li>
            </ul>
            <ul id="nav-mobile" class="side-nav">
                <li><a href="{% url 'canchas:home' %}">Canchas</a></li>
                <li><a href="{% url 'canchas:deporte-list' %}">Deportes</a></li>
                <li><a href="{% url 'canchas:reserva-list' %}">Reservas</a></li>
                <li><a href="{% url 'canchas:log-out' %}">Salir</a></li>
            </ul>
            <a href="#" data-activates="nav-mobile" class="button-collapse"><i class="material-icons">menu</i></a>
        {% endif %}
    </div>
</nav>
<div class="container">
    <div class="section">
        {% block main-content %}{% endblock %}
    </div>
    <br><br>
</div>

<script type="text/javascript" src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
<!-- Compiled and minified JavaScript -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.100.2/js/materialize.min.js"></script>
<script>
    $(document).ready(function () {
        $('select').material_select();
        $('.datepicker').pickadate({
            selectMonths: true,
            selectYears: 15,
            today: 'Hoy',
            clear: 'Limpiar',
            close: 'Ok',
            closeOnSelect: false
        });
    });
</script>
</body>
</html>
